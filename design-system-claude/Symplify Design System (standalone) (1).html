document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

e>Type — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-width: 767.98px) {\\n  :root {\\n    --spacing-page: 12px;\\n    --spacing-card: 12px;\\n    --space-card-inset: var(--space-3);\\n    --touch-target: var(--touch-target-mobile);\\n    --chart-min-height: 200px;\\n  }\\n}\\n@media (min-width: 768px) and (max-width: 834px) {  /* iPad Pro 11\\\" portrait */\\n  :root { --spacing-page: 16px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 250px; }\\n}\\n@media (min-width: 835px) and (max-width: 1210px) { /* tablet landscape */\\n  :root { --spacing-page: 20px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 280px; }\\n}\\n\\n/* ─── Semantic typography classes ───────────────────────── */\\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\\nbody {\\n  font-family: var(--font-sans);\\n  font-size: var(--text-base);\\n  line-height: var(--lh-body);\\n  color: var(--fg-1);\\n  background: var(--bg-app);\\n}\\n\\n.h1, h1 { font-size: var(--text-2xl); font-weight: var(--fw-bold);     line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h2, h2 { font-size: var(--text-xl);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h3, h3 { font-size: var(--text-lg);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h4, h4 { font-size: var(--text-md);  font-weight: var(--fw-bold);     line-height: var(--lh-tight); color: var(--heading-color); margin: 0; }\\n.text-body  { font-size: var(--text-base); font-weight: var(--fw-regular); color: var(--fg-2); }\\n.text-table { font-size: var(--fs-table);  font-weight: var(--fw-medium);  color: var(--fg-2); }\\n.text-meta  { font-size: var(--text-xs);   font-weight: var(--fw-medium);  color: var(--fg-3); }\\n.text-tiny  { font-size: var(--fs-tiny);   font-weight: var(--fw-medium);  color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }\\n.btn-label  { font-size: var(--text-sm);   font-weight: var(--fw-bold); line-height: 1; }\\n.clinical-num { font-family: var(--font-mono); font-size: var(--font-size-clinical); font-feature-settings: 'tnum'; }\\ncode, .mono { font-family: var(--font-mono); font-size: 13px; }\\n\\n<\u002Fstyle>\\n<style>\\n  body { padding: 56px 64px; max-width: 1280px; }\\n  .row { display: grid; grid-template-columns: 100px 96px 1fr 220px; gap: 24px; align-items: baseline; padding: 18px 0; border-top: 1px solid var(--border-color); }\\n  .row:first-of-type { border-top: 0; }\\n  .token { font-family: var(--font-mono); color: var(--fg-3); font-size: 12px; }\\n  .meta { color: var(--fg-3); font-size: 13px; }\\n  .specimen { color: var(--fg-1); }\\n  header { margin-bottom: 40px; }\\n  .lockup { display: flex; align-items: baseline; gap: 14px; }\\n  .lockup .name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--primary); }\\n  .lockup .sub { color: var(--fg-3); font-size: 13px; }\\n  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin: 40px 0 8px; }\\n  .weights { display: flex; gap: 32px; flex-wrap: wrap; padding: 16px 0; }\\n  .weights span { font-size: 22px; }\\n<\u002Fstyle>\\n<\u002Fhead>\\n<body>\\n  <header>\\n    <div class=\\\"lockup\\\">\\n      <span class=\\\"name\\\">Type<\u002Fspan>\\n      <span class=\\\"sub\\\">Inter (variable) · 400, 500, 600, 700 · JetBrains Mono for data<\u002Fspan>\\n    <\u002Fdiv>\\n    <h1 style=\\\"margin-top:18px; font-size: 56px; font-weight: 800; letter-spacing: -0.02em;\\\">Calm. Dense. Legible at a glance.<\u002Fh1>\\n    <p style=\\\"color: var(--fg-2); font-size: 16px; max-width: 720px; margin-top: 12px;\\\">Inter is the UI typeface; JetBrains Mono carries IDs, codes, and monospace data. The scale runs small (11–24px) by intent — clinical screens pack vital information into table rows and dashboard cells, not magazine spreads.<\u002Fp>\\n  <\u002Fheader>\\n\\n  <div class=\\\"group-label\\\">Scale<\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-2xl<\u002Fspan><span class=\\\"meta\\\">24 / 700<\u002Fspan><span class=\\\"specimen h1\\\">Patient Records — ICU‑4B<\u002Fspan><span class=\\\"meta\\\">Page title<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-xl<\u002Fspan><span class=\\\"meta\\\">20 / 600<\u002Fspan><span class=\\\"specimen h2\\\">Active medication orders<\u002Fspan><span class=\\\"meta\\\">Section header<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-lg<\u002Fspan><span class=\\\"meta\\\">18 / 600<\u002Fspan><span class=\\\"specimen h3\\\">Vital signs — last 6 h<\u002Fspan><span class=\\\"meta\\\">Widget / card group<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-md<\u002Fspan><span class=\\\"meta\\\">16 / 700<\u002Fspan><span class=\\\"specimen h4\\\">Sarah Mitchell, 62F<\u002Fspan><span class=\\\"meta\\\">Card title · clinical emphasis<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-base<\u002Fspan><span class=\\\"meta\\\">14 / 400<\u002Fspan><span class=\\\"specimen text-body\\\">Hemodynamically stable but mild desaturation. Possible early fluid overload — request cardiology consult.<\u002Fspan><span class=\\\"meta\\\">Body, default<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--fs-table<\u002Fspan><span class=\\\"meta\\\">13 / 500<\u002Fspan><span class=\\\"specimen text-table\\\">Heparin drip · 1000 u/h · started 14:32<\u002Fspan><span class=\\\"meta\\\">Table cell (helper)<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-sm<\u002Fspan><span class=\\\"meta\\\">12 / 700<\u002Fspan><span class=\\\"specimen btn-label\\\">ORDER LABS<\u002Fspan><span class=\\\"meta\\\">Button label, badges<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--text-xs<\u002Fspan><span class=\\\"meta\\\">11 / 500<\u002Fspan><span class=\\\"specimen text-meta\\\">Updated 12 min ago by Dr. Chen<\u002Fspan><span class=\\\"meta\\\">Metadata, captions<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"row\\\"><span class=\\\"token\\\">--fs-tiny<\u002Fspan><span class=\\\"meta\\\">10 / 500<\u002Fspan><span class=\\\"specimen text-tiny\\\">CRITICAL · ICU · BED 12<\u002Fspan><span class=\\\"meta\\\">Eyebrow / pill labels (helper)<\u002Fspan><\u002Fdiv>\\n\\n  <div class=\\\"group-label\\\">Weights<\u002Fdiv>\\n  <div class=\\\"weights\\\" style=\\\"font-family: var(--font-sans);\\\">\\n    <span style=\\\"font-weight:400\\\">Regular 400 — body<\u002Fspan>\\n    <span style=\\\"font-weight:500\\\">Medium 500 — table cell<\u002Fspan>\\n    <span style=\\\"font-weight:600\\\">SemiBold 600 — section<\u002Fspan>\\n    <span style=\\\"font-weight:700\\\">Bold 700 — title, button<\u002Fspan>\\n  <\u002Fdiv>\\n\\n  <div class=\\\"group-label\\\">Numerals<\u002Fdiv>\\n  <div style=\\\"font-family: var(--font-sans); font-feature-settings: 'tnum'; font-size: 22px; font-weight: 600; padding: 16px 0; display:flex; gap: 40px; flex-wrap: wrap;\\\">\\n    <span>96 <span style=\\\"font-weight:400; color: var(--fg-3); font-size: 13px;\\\">bpm<\u002Fspan><\u002Fspan>\\n    <span>142/88 <span style=\\\"font-weight:400; color: var(--fg-3); font-size: 13px;\\\">mmHg<\u002Fspan><\u002Fspan>\\n    <span>94% <span style=\\\"font-weight:400; color: var(--fg-3); font-size: 13px;\\\">SpO₂<\u002Fspan><\u002Fspan>\\n    <span>38.6 <span style=\\\"font-weight:400; color: var(--fg-3); font-size: 13px;\\\">°C<\u002Fspan><\u002Fspan>\\n    <span>0123456789<\u002Fspan>\\n  <\u002Fdiv>\\n  <p class=\\\"meta\\\" style=\\\"margin-top: 8px;\\\">Tabular numerals (<code class=\\\"mono\\\">font-feature-settings: 'tnum'<\u002Fcode>) on every numeric column. Vitals, lab values, dosages — anything a clinician scans down a column.<\u002Fp>\\n\\n  <div class=\\\"group-label\\\">JetBrains Mono — data &amp; identifiers<\u002Fdiv>\\n  <div style=\\\"font-family: var(--font-mono); font-size: 16px; padding: 16px 0; display:flex; flex-direction: column; gap: 8px; color: var(--fg-1);\\\">\\n    <span>MRN A‑0042199 &nbsp;·&nbsp; NDC 0071‑0156‑23 &nbsp;·&nbsp; ICD‑10 I21.4<\u002Fspan>\\n    <span class=\\\"clinical-num\\\" style=\\\"font-weight:600;\\\">96 bpm &nbsp; 142/88 mmHg &nbsp; 94% SpO₂ &nbsp; 38.6 °C<\u002Fspan>\\n    <span style=\\\"color: var(--fg-3); font-size: 13px;\\\">0123456789 — slashed zero, fixed width, unambiguous in dosing<\u002Fspan>\\n  <\u002Fdiv>\\n  <p class=\\\"meta\\\" style=\\\"margin-top: 4px;\\\">JetBrains Mono (<code class=\\\"mono\\\">--font-mono<\u002Fcode>) for MRNs, drug codes, and any value where character ambiguity is a safety risk. <code class=\\\"mono\\\">--font-size-clinical<\u002Fcode> bumps vitals to 16px.<\u002Fp>\\n<\u002Fbody>\\n<\u002Fhtml>\\n\",\"colors\":\"<!doctype html>\\n<!-- @dsCard group=\\\"Colors\\\" name=\\\"Symplify – Colors\\\" subtitle=\\\"Brand, status, 5-tier clinical scale, neutrals\\\" viewport=\\\"1280x1500\\\" -->\\n<html lang=\\\"en\\\">\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<title>Colors — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-width: 767.98px) {\\n  :root {\\n    --spacing-page: 12px;\\n    --spacing-card: 12px;\\n    --space-card-inset: var(--space-3);\\n    --touch-target: var(--touch-target-mobile);\\n    --chart-min-height: 200px;\\n  }\\n}\\n@media (min-width: 768px) and (max-width: 834px) {  /* iPad Pro 11\\\" portrait */\\n  :root { --spacing-page: 16px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 250px; }\\n}\\n@media (min-width: 835px) and (max-width: 1210px) { /* tablet landscape */\\n  :root { --spacing-page: 20px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 280px; }\\n}\\n\\n/* ─── Semantic typography classes ───────────────────────── */\\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\\nbody {\\n  font-family: var(--font-sans);\\n  font-size: var(--text-base);\\n  line-height: var(--lh-body);\\n  color: var(--fg-1);\\n  background: var(--bg-app);\\n}\\n\\n.h1, h1 { font-size: var(--text-2xl); font-weight: var(--fw-bold);     line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h2, h2 { font-size: var(--text-xl);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h3, h3 { font-size: var(--text-lg);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h4, h4 { font-size: var(--text-md);  font-weight: var(--fw-bold);     line-height: var(--lh-tight); color: var(--heading-color); margin: 0; }\\n.text-body  { font-size: var(--text-base); font-weight: var(--fw-regular); color: var(--fg-2); }\\n.text-table { font-size: var(--fs-table);  font-weight: var(--fw-medium);  color: var(--fg-2); }\\n.text-meta  { font-size: var(--text-xs);   font-weight: var(--fw-medium);  color: var(--fg-3); }\\n.text-tiny  { font-size: var(--fs-tiny);   font-weight: var(--fw-medium);  color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }\\n.btn-label  { font-size: var(--text-sm);   font-weight: var(--fw-bold); line-height: 1; }\\n.clinical-num { font-family: var(--font-mono); font-size: var(--font-size-clinical); font-feature-settings: 'tnum'; }\\ncode, .mono { font-family: var(--font-mono); font-size: 13px; }\\n\\n<\u002Fstyle>\\n<style>\\n  body { padding: 56px 64px; max-width: 1280px; }\\n  header { margin-bottom: 40px; }\\n  .name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--primary); }\\n  h1 { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; margin-top: 18px; }\\n  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin: 48px 0 12px; }\\n\\n  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }\\n  .swatch { background: var(--white); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; }\\n  .swatch .chip { height: 96px; }\\n  .swatch .info { padding: 12px 14px; }\\n  .swatch .label { font-weight: 600; font-size: 13px; color: var(--fg-1); }\\n  .swatch .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; letter-spacing: 0.02em; text-transform: uppercase; }\\n\\n  /* Clinical severity */\\n  .clin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }\\n  .clin { padding: 16px 18px; border-radius: var(--radius-md); font-weight: 600; font-size: 14px; border: 1px solid; }\\n  .clin .badge { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; display:flex; align-items:center; gap: 6px; }\\n  .clin .desc { font-weight: 400; font-size: 12px; margin-top: 6px; opacity: 0.9; }\\n  .clin .tok { font-family: var(--font-mono); font-size: 10px; margin-top: 10px; opacity: 0.7; }\\n\\n  .neutrals { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }\\n  .neutrals .n { aspect-ratio: 1 / 1.1; border-radius: 4px; display: flex; flex-direction: column; justify-content: flex-end; padding: 6px; font-family: var(--font-mono); font-size: 9px; }\\n<\u002Fstyle>\\n<\u002Fhead>\\n<body>\\n<header>\\n  <span class=\\\"name\\\">Colors<\u002Fspan>\\n  <h1>Color is information.<\u002Fh1>\\n  <p style=\\\"color: var(--fg-2); font-size: 16px; max-width: 760px; margin-top: 12px;\\\">Indigo navy and teal carry the brand. The five clinical tiers carry severity. Neutrals carry everything else — about 70% of every screen.<\u002Fp>\\n<\u002Fheader>\\n\\n<div class=\\\"group-label\\\">Brand<\u002Fdiv>\\n<div class=\\\"swatches\\\">\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--primary);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Primary — indigo navy<\u002Fdiv><div class=\\\"hex\\\">#2E37A4 · --primary<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--primary-hover);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Primary hover<\u002Fdiv><div class=\\\"hex\\\">#3C449C · --primary-hover<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--secondary);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Secondary — teal<\u002Fdiv><div class=\\\"hex\\\">#00D3C7 · --secondary<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--primary-transparent); border-bottom: 1px solid var(--border-color);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Primary tint<\u002Fdiv><div class=\\\"hex\\\">#ECEDF7 · --primary-transparent<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Status<\u002Fdiv>\\n<div class=\\\"swatches\\\">\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--success);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Success<\u002Fdiv><div class=\\\"hex\\\">#27AE60 · --success<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--info);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Info<\u002Fdiv><div class=\\\"hex\\\">#2F80ED · --info<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--warning);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Warning<\u002Fdiv><div class=\\\"hex\\\">#C9A227 · --warning<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"swatch\\\"><div class=\\\"chip\\\" style=\\\"background: var(--danger);\\\"><\u002Fdiv><div class=\\\"info\\\"><div class=\\\"label\\\">Danger<\u002Fdiv><div class=\\\"hex\\\">#EF1E1E · --danger<\u002Fdiv><\u002Fdiv><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Clinical severity — the healthcare token scale<\u002Fdiv>\\n<p style=\\\"color: var(--fg-2); font-size: 13px; max-width: 820px; margin-bottom: 14px;\\\">Five tiers, each a triplet: solid foreground + tinted <code class=\\\"mono\\\">-bg<\u002Fcode> + <code class=\\\"mono\\\">-border<\u002Fcode>. This is the canonical scale for triage, drug interactions, alerts, and patient status — use the named tier literally, never an amber-by-eye. Tailwind-derived for consistent contrast in light and dark.<\u002Fp>\\n<div class=\\\"clin-grid\\\">\\n  <div class=\\\"clin\\\" style=\\\"background: var(--clinical-critical-bg); color: var(--clinical-critical); border-color: var(--clinical-critical-border);\\\">\\n    <div class=\\\"badge\\\">⛔ Critical<\u002Fdiv>\\n    <div class=\\\"desc\\\">Immediate action — code, contraindication, crashing vitals.<\u002Fdiv>\\n    <div class=\\\"tok\\\">--clinical-critical · #DC2626<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div class=\\\"clin\\\" style=\\\"background: var(--clinical-urgent-bg); color: var(--clinical-urgent); border-color: var(--clinical-urgent-border);\\\">\\n    <div class=\\\"badge\\\">⚠ Urgent<\u002Fdiv>\\n    <div class=\\\"desc\\\">Act this shift — major interaction, deteriorating trend.<\u002Fdiv>\\n    <div class=\\\"tok\\\">--clinical-urgent · #EA580C<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div class=\\\"clin\\\" style=\\\"background: var(--clinical-caution-bg); color: var(--clinical-caution); border-color: var(--clinical-caution-border);\\\">\\n    <div class=\\\"badge\\\">⚡ Caution<\u002Fdiv>\\n    <div class=\\\"desc\\\">Monitor — moderate interaction, watch parameters.<\u002Fdiv>\\n    <div class=\\\"tok\\\">--clinical-caution · #CA8A04<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div class=\\\"clin\\\" style=\\\"background: var(--clinical-stable-bg); color: var(--clinical-stable); border-color: var(--clinical-stable-border);\\\">\\n    <div class=\\\"badge\\\">✓ Stable<\u002Fdiv>\\n    <div class=\\\"desc\\\">Within range — minor interaction, normal vitals.<\u002Fdiv>\\n    <div class=\\\"tok\\\">--clinical-stable · #16A34A<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div class=\\\"clin\\\" style=\\\"background: var(--clinical-info-bg); color: var(--clinical-info); border-color: var(--clinical-info-border);\\\">\\n    <div class=\\\"badge\\\">ℹ Info<\u002Fdiv>\\n    <div class=\\\"desc\\\">FYI — pending result, scheduled, informational.<\u002Fdiv>\\n    <div class=\\\"tok\\\">--clinical-info · #1D4ED8<\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Clinical tiers in use<\u002Fdiv>\\n<div style=\\\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px;\\\">\\n  <div style=\\\"background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-subtle); border-left: 4px solid var(--clinical-critical);\\\">\\n    <span style=\\\"display:inline-block; padding: 3px 10px; border-radius: 999px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; background: var(--clinical-critical-bg); color: var(--clinical-critical);\\\">CRITICAL<\u002Fspan>\\n    <div style=\\\"font-weight: 700; font-size: 14px; margin-top: 8px; color: var(--fg-1);\\\">Sarah Mitchell<\u002Fdiv>\\n    <div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 2px;\\\">62F · ICU‑4B · Bed 12<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div style=\\\"background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-subtle); border-left: 4px solid var(--clinical-urgent);\\\">\\n    <span style=\\\"display:inline-block; padding: 3px 10px; border-radius: 999px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; background: var(--clinical-urgent-bg); color: var(--clinical-urgent);\\\">URGENT<\u002Fspan>\\n    <div style=\\\"font-weight: 700; font-size: 14px; margin-top: 8px; color: var(--fg-1);\\\">James Rodriguez<\u002Fdiv>\\n    <div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 2px;\\\">45M · 3A‑201 · Bed 4<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div style=\\\"background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-subtle); border-left: 4px solid var(--clinical-caution);\\\">\\n    <span style=\\\"display:inline-block; padding: 3px 10px; border-radius: 999px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; background: var(--clinical-caution-bg); color: var(--clinical-caution);\\\">CAUTION<\u002Fspan>\\n    <div style=\\\"font-weight: 700; font-size: 14px; margin-top: 8px; color: var(--fg-1);\\\">Maria Santos<\u002Fdiv>\\n    <div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 2px;\\\">58F · 2B‑108 · Bed 6<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div style=\\\"background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-subtle); border-left: 4px solid var(--clinical-stable);\\\">\\n    <span style=\\\"display:inline-block; padding: 3px 10px; border-radius: 999px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; background: var(--clinical-stable-bg); color: var(--clinical-stable);\\\">STABLE<\u002Fspan>\\n    <div style=\\\"font-weight: 700; font-size: 14px; margin-top: 8px; color: var(--fg-1);\\\">David Park<\u002Fdiv>\\n    <div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 2px;\\\">34M · 1A‑042 · Bed 2<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div style=\\\"background: white; border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 16px; box-shadow: var(--shadow-subtle); border-left: 4px solid var(--clinical-info);\\\">\\n    <span style=\\\"display:inline-block; padding: 3px 10px; border-radius: 999px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; background: var(--clinical-info-bg); color: var(--clinical-info);\\\">PENDING<\u002Fspan>\\n    <div style=\\\"font-weight: 700; font-size: 14px; margin-top: 8px; color: var(--fg-1);\\\">Lab results<\u002Fdiv>\\n    <div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 2px;\\\">CBC, BMP · expected 16:00<\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Neutrals — gray ramp (light → dark)<\u002Fdiv>\\n<div class=\\\"neutrals\\\">\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-50); color: var(--fg-3);\\\">50<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-100); color: var(--fg-2);\\\">100<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-150); color: var(--fg-3);\\\">150<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-200); color: var(--fg-2);\\\">200<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-300); color: var(--white);\\\">300<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-400); color: var(--white);\\\">400<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-500); color: var(--white);\\\">500<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-600); color: var(--white);\\\">600<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-700); color: var(--white);\\\">700<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-800); color: var(--white);\\\">800<\u002Fdiv>\\n  <div class=\\\"n\\\" style=\\\"background: var(--gray-900); color: var(--white);\\\">900<\u002Fdiv>\\n<\u002Fdiv>\\n<p style=\\\"font-size: 12px; color: var(--fg-3); margin-top: 8px;\\\">Foregrounds: <code class=\\\"mono\\\">--fg-1<\u002Fcode> 900 / <code class=\\\"mono\\\">--fg-2<\u002Fcode> 500 (body) / <code class=\\\"mono\\\">--fg-3<\u002Fcode> 400 (placeholder). Borders: <code class=\\\"mono\\\">--border-color<\u002Fcode> #E7E8EB. Backgrounds: <code class=\\\"mono\\\">--gray-50<\u002Fcode> / <code class=\\\"mono\\\">--gray-150<\u002Fcode>.<\u002Fp>\\n<\u002Fbody>\\n<\u002Fhtml>\\n\",\"spacing\":\"<!doctype html>\\n<!-- @dsCard group=\\\"Spacing\\\" name=\\\"Symplify – Spacing\\\" subtitle=\\\"Spacing scale, radius, elevation\\\" viewport=\\\"1280x1300\\\" -->\\n<html lang=\\\"en\\\">\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<title>Spacing — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-width: 767.98px) {\\n  :root {\\n    --spacing-page: 12px;\\n    --spacing-card: 12px;\\n    --space-card-inset: var(--space-3);\\n    --touch-target: var(--touch-target-mobile);\\n    --chart-min-height: 200px;\\n  }\\n}\\n@media (min-width: 768px) and (max-width: 834px) {  /* iPad Pro 11\\\" portrait */\\n  :root { --spacing-page: 16px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 250px; }\\n}\\n@media (min-width: 835px) and (max-width: 1210px) { /* tablet landscape */\\n  :root { --spacing-page: 20px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 280px; }\\n}\\n\\n/* ─── Semantic typography classes ───────────────────────── */\\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\\nbody {\\n  font-family: var(--font-sans);\\n  font-size: var(--text-base);\\n  line-height: var(--lh-body);\\n  color: var(--fg-1);\\n  background: var(--bg-app);\\n}\\n\\n.h1, h1 { font-size: var(--text-2xl); font-weight: var(--fw-bold);     line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h2, h2 { font-size: var(--text-xl);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h3, h3 { font-size: var(--text-lg);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h4, h4 { font-size: var(--text-md);  font-weight: var(--fw-bold);     line-height: var(--lh-tight); color: var(--heading-color); margin: 0; }\\n.text-body  { font-size: var(--text-base); font-weight: var(--fw-regular); color: var(--fg-2); }\\n.text-table { font-size: var(--fs-table);  font-weight: var(--fw-medium);  color: var(--fg-2); }\\n.text-meta  { font-size: var(--text-xs);   font-weight: var(--fw-medium);  color: var(--fg-3); }\\n.text-tiny  { font-size: var(--fs-tiny);   font-weight: var(--fw-medium);  color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }\\n.btn-label  { font-size: var(--text-sm);   font-weight: var(--fw-bold); line-height: 1; }\\n.clinical-num { font-family: var(--font-mono); font-size: var(--font-size-clinical); font-feature-settings: 'tnum'; }\\ncode, .mono { font-family: var(--font-mono); font-size: 13px; }\\n\\n<\u002Fstyle>\\n<style>\\n  body { padding: 56px 64px; max-width: 1280px; }\\n  header { margin-bottom: 40px; }\\n  .name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--primary); }\\n  h1 { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; margin-top: 18px; }\\n  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin: 48px 0 12px; }\\n  .row { display: grid; grid-template-columns: 110px 80px 1fr; gap: 24px; align-items: center; padding: 12px 0; border-top: 1px solid var(--border-color); }\\n  .row:first-of-type { border-top: 0; }\\n  .token { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }\\n  .meta { color: var(--fg-3); font-size: 13px; font-family: var(--font-mono); }\\n  .bar { height: 16px; background: var(--primary); border-radius: 2px; }\\n\\n  .radii { display: grid; grid-template-columns: repeat(6, 1fr); gap: 16px; }\\n  .rad { background: var(--primary-transparent); height: 110px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; border: 1px solid var(--border-color); }\\n  .rad .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }\\n  .rad .k { font-weight: 600; color: var(--fg-1); font-size: 13px; }\\n\\n  .elev { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 16px 0; }\\n  .elev .card { background: white; border-radius: var(--radius-sm); padding: 24px; }\\n  .elev .label { font-size: 12px; color: var(--fg-3); margin-top: 8px; font-family: var(--font-mono); }\\n  .elev .name2 { font-weight: 600; color: var(--fg-1); font-size: 14px; }\\n<\u002Fstyle>\\n<\u002Fhead>\\n<body>\\n<header>\\n  <span class=\\\"name\\\">Spacing, radius, elevation<\u002Fspan>\\n  <h1>4px grid. Four radii. Three shadows.<\u002Fh1>\\n  <p style=\\\"color: var(--fg-2); font-size: 16px; max-width: 760px; margin-top: 12px;\\\">Density is non-negotiable. Default to the smallest spacing token that still reads — the larger ones are reserved for page-level layout, not card internals.<\u002Fp>\\n<\u002Fheader>\\n\\n<div class=\\\"group-label\\\">Spacing<\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-1<\u002Fspan><span class=\\\"meta\\\">4 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 4px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-2<\u002Fspan><span class=\\\"meta\\\">8 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 8px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-3<\u002Fspan><span class=\\\"meta\\\">12 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 12px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-4<\u002Fspan><span class=\\\"meta\\\">16 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 16px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-5<\u002Fspan><span class=\\\"meta\\\">20 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 20px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-6<\u002Fspan><span class=\\\"meta\\\">24 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 24px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-8<\u002Fspan><span class=\\\"meta\\\">32 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 32px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-10<\u002Fspan><span class=\\\"meta\\\">40 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 40px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-12<\u002Fspan><span class=\\\"meta\\\">48 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 48px;\\\"><\u002Fdiv><\u002Fdiv>\\n<div class=\\\"row\\\"><span class=\\\"token\\\">--space-16<\u002Fspan><span class=\\\"meta\\\">64 px<\u002Fspan><div class=\\\"bar\\\" style=\\\"width: 64px;\\\"><\u002Fdiv><\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Radius<\u002Fdiv>\\n<div class=\\\"radii\\\" style=\\\"grid-template-columns: repeat(5, 1fr);\\\">\\n  <div class=\\\"rad\\\" style=\\\"border-radius: var(--radius-sm);\\\"><span class=\\\"k\\\">SM<\u002Fspan><span class=\\\"v\\\">4 px · inputs, buttons, chips<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"rad\\\" style=\\\"border-radius: var(--radius-md);\\\"><span class=\\\"k\\\">MD · card<\u002Fspan><span class=\\\"v\\\">8 px · default cards<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"rad\\\" style=\\\"border-radius: var(--radius-lg);\\\"><span class=\\\"k\\\">LG · modal<\u002Fspan><span class=\\\"v\\\">12 px · modals, large cards<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"rad\\\" style=\\\"border-radius: var(--radius-xl);\\\"><span class=\\\"k\\\">XL<\u002Fspan><span class=\\\"v\\\">16 px · hero / feature<\u002Fspan><\u002Fdiv>\\n  <div class=\\\"rad\\\" style=\\\"border-radius: var(--radius-pill);\\\"><span class=\\\"k\\\">Pill<\u002Fspan><span class=\\\"v\\\">999 px · status<\u002Fspan><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Elevation<\u002Fdiv>\\n<div class=\\\"elev\\\">\\n  <div>\\n    <div class=\\\"card\\\" style=\\\"box-shadow: var(--shadow-subtle);\\\">\\n      <div class=\\\"name2\\\">Subtle<\u002Fdiv>\\n      <div class=\\\"label\\\">Default for cards, list items.<\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"label\\\">--shadow-subtle<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div>\\n    <div class=\\\"card\\\" style=\\\"box-shadow: var(--shadow-medium);\\\">\\n      <div class=\\\"name2\\\">Medium<\u002Fdiv>\\n      <div class=\\\"label\\\">Hover, raised cards, dropdowns.<\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"label\\\">--shadow-medium<\u002Fdiv>\\n  <\u002Fdiv>\\n  <div>\\n    <div class=\\\"card\\\" style=\\\"box-shadow: var(--shadow-elevated);\\\">\\n      <div class=\\\"name2\\\">Elevated<\u002Fdiv>\\n      <div class=\\\"label\\\">Modals, popovers, floating panels.<\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"label\\\">--shadow-elevated<\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Touch targets<\u002Fdiv>\\n<div style=\\\"display: flex; gap: 16px; align-items: flex-end; margin-bottom: 8px;\\\">\\n  <div style=\\\"text-align:center;\\\"><div style=\\\"width: 32px; height: 32px; background: var(--primary); border-radius: var(--radius-sm); display:flex; align-items:center; justify-content:center; color:white; font-size: 11px; font-weight:700;\\\">32<\u002Fdiv><div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 6px; font-family: var(--font-mono);\\\">desktop<\u002Fdiv><\u002Fdiv>\\n  <div style=\\\"text-align:center;\\\"><div style=\\\"width: 44px; height: 44px; background: var(--primary); border-radius: var(--radius-sm); display:flex; align-items:center; justify-content:center; color:white; font-size: 11px; font-weight:700;\\\">44<\u002Fdiv><div style=\\\"font-size: 11px; color: var(--fg-3); margin-top: 6px; font-family: var(--font-mono);\\\">mobile<\u002Fdiv><\u002Fdiv>\\n  <p style=\\\"font-size: 12px; color: var(--fg-3); max-width: 480px;\\\"><code class=\\\"mono\\\">--touch-target<\u002Fcode> resolves to 32px on desktop, 44px at the mobile breakpoint. Page &amp; card spacing also tighten responsively (20 → 16 → 12px).<\u002Fp>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Breakpoints<\u002Fdiv>\\n<div style=\\\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; font-family: var(--font-mono); font-size: 12px;\\\">\\n  <div style=\\\"padding: 12px; background: var(--gray-150); border-radius: var(--radius-sm);\\\"><div style=\\\"font-weight:700; color: var(--fg-1); font-family: var(--font-sans);\\\">SM<\u002Fdiv>576 px<\u002Fdiv>\\n  <div style=\\\"padding: 12px; background: var(--gray-150); border-radius: var(--radius-sm);\\\"><div style=\\\"font-weight:700; color: var(--fg-1); font-family: var(--font-sans);\\\">MD<\u002Fdiv>768 px<\u002Fdiv>\\n  <div style=\\\"padding: 12px; background: var(--gray-150); border-radius: var(--radius-sm);\\\"><div style=\\\"font-weight:700; color: var(--fg-1); font-family: var(--font-sans);\\\">LG<\u002Fdiv>992 px<\u002Fdiv>\\n  <div style=\\\"padding: 12px; background: var(--gray-150); border-radius: var(--radius-sm);\\\"><div style=\\\"font-weight:700; color: var(--fg-1); font-family: var(--font-sans);\\\">XL<\u002Fdiv>1200 px<\u002Fdiv>\\n  <div style=\\\"padding: 12px; background: var(--gray-150); border-radius: var(--radius-sm);\\\"><div style=\\\"font-weight:700; color: var(--fg-1); font-family: var(--font-sans);\\\">XXL<\u002Fdiv>1400 px<\u002Fdiv>\\n<\u002Fdiv>\\n<\u002Fbody>\\n<\u002Fhtml>\\n\",\"components\":\"<!doctype html>\\n<!-- @dsCard group=\\\"Components\\\" name=\\\"Symplify – Components\\\" subtitle=\\\"Buttons, badges, inputs, tables, cards\\\" viewport=\\\"1280x1700\\\" -->\\n<html lang=\\\"en\\\">\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<title>Components — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-width: 767.98px) {\\n  :root {\\n    --spacing-page: 12px;\\n    --spacing-card: 12px;\\n    --space-card-inset: var(--space-3);\\n    --touch-target: var(--touch-target-mobile);\\n    --chart-min-height: 200px;\\n  }\\n}\\n@media (min-width: 768px) and (max-width: 834px) {  /* iPad Pro 11\\\" portrait */\\n  :root { --spacing-page: 16px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 250px; }\\n}\\n@media (min-width: 835px) and (max-width: 1210px) { /* tablet landscape */\\n  :root { --spacing-page: 20px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 280px; }\\n}\\n\\n/* ─── Semantic typography classes ───────────────────────── */\\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\\nbody {\\n  font-family: var(--font-sans);\\n  font-size: var(--text-base);\\n  line-height: var(--lh-body);\\n  color: var(--fg-1);\\n  background: var(--bg-app);\\n}\\n\\n.h1, h1 { font-size: var(--text-2xl); font-weight: var(--fw-bold);     line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h2, h2 { font-size: var(--text-xl);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h3, h3 { font-size: var(--text-lg);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h4, h4 { font-size: var(--text-md);  font-weight: var(--fw-bold);     line-height: var(--lh-tight); color: var(--heading-color); margin: 0; }\\n.text-body  { font-size: var(--text-base); font-weight: var(--fw-regular); color: var(--fg-2); }\\n.text-table { font-size: var(--fs-table);  font-weight: var(--fw-medium);  color: var(--fg-2); }\\n.text-meta  { font-size: var(--text-xs);   font-weight: var(--fw-medium);  color: var(--fg-3); }\\n.text-tiny  { font-size: var(--fs-tiny);   font-weight: var(--fw-medium);  color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }\\n.btn-label  { font-size: var(--text-sm);   font-weight: var(--fw-bold); line-height: 1; }\\n.clinical-num { font-family: var(--font-mono); font-size: var(--font-size-clinical); font-feature-settings: 'tnum'; }\\ncode, .mono { font-family: var(--font-mono); font-size: 13px; }\\n\\n<\u002Fstyle>\\n<style>\\n  body { padding: 56px 64px; max-width: 1280px; }\\n  header { margin-bottom: 40px; }\\n  .name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--primary); }\\n  h1 { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; margin-top: 18px; }\\n  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin: 48px 0 12px; }\\n  .panel { background: var(--white); border: 1px solid var(--border-color); border-radius: var(--radius-
