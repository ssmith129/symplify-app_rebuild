sm); padding: 28px 28px; box-shadow: var(--shadow-subtle); }\\n  .row-flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }\\n\\n  /* Buttons */\\n  .btn { font-family: var(--font-sans); font-size: var(--fs-button); font-weight: var(--fw-bold); letter-spacing: 0.02em; line-height: 1; padding: 0 16px; height: 40px; border-radius: var(--radius-sm); border: 1px solid transparent; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: background .15s, color .15s; }\\n  .btn-primary   { background: var(--primary); color: var(--white); }\\n  .btn-primary:hover { background: var(--primary-hover); }\\n  .btn-secondary { background: var(--white); color: var(--primary); border-color: var(--primary); }\\n  .btn-secondary:hover { background: var(--primary-transparent); }\\n  .btn-ghost     { background: transparent; color: var(--fg-2); }\\n  .btn-ghost:hover { color: var(--fg-1); background: var(--gray-100); }\\n  .btn-danger    { background: var(--danger); color: var(--white); }\\n  .btn-success   { background: var(--success); color: var(--white); }\\n  .btn-sm { height: 32px; padding: 0 12px; font-size: 11px; }\\n  .btn-lg { height: 48px; padding: 0 22px; font-size: 13px; }\\n  .btn[disabled] { opacity: .5; cursor: not-allowed; }\\n\\n  /* Badges */\\n  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 10px; font-weight: 700; letter-spacing: 0.05em; line-height: 1; }\\n  .badge-success { background: var(--success-transparent); color: var(--success); }\\n  .badge-info    { background: var(--info-transparent); color: var(--info); }\\n  .badge-warn    { background: var(--warning-transparent); color: #856404; }\\n  .badge-danger  { background: var(--danger-transparent); color: var(--danger); }\\n  .badge-neutral { background: var(--gray-100); color: var(--fg-2); }\\n  .badge-primary { background: var(--primary-transparent); color: var(--primary); }\\n\\n  /* Inputs */\\n  .field { display: flex; flex-direction: column; gap: 6px; }\\n  .field label { font-size: 12px; font-weight: 600; color: var(--fg-1); }\\n  .input, .select, .textarea { font-family: var(--font-sans); font-size: 14px; color: var(--fg-1); padding: 9px 12px; border: 1px solid var(--gray-200); background: var(--white); border-radius: var(--radius-sm); height: 40px; }\\n  .input:focus, .select:focus, .textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-transparent); }\\n  .input::placeholder { color: var(--fg-3); }\\n\\n  /* Table */\\n  table.t { width: 100%; border-collapse: separate; border-spacing: 0; font-size: var(--fs-table); }\\n  table.t th { text-align: left; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); font-weight: 600; padding: 10px 16px; background: var(--gray-100); border-bottom: 1px solid var(--border-color); }\\n  table.t td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); color: var(--fg-1); }\\n  table.t tr:last-child td { border-bottom: 0; }\\n  table.t .num { font-feature-settings: 'tnum'; font-variant-numeric: tabular-nums; }\\n\\n  /* Card */\\n  .card-demo { background: var(--white); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 20px; box-shadow: var(--shadow-subtle); display: flex; flex-direction: column; gap: 8px; min-width: 280px; }\\n  .card-demo .ttl { font-weight: 700; font-size: 16px; }\\n  .card-demo .met { color: var(--fg-3); font-size: 11px; }\\n\\n  /* Toggles, segmented */\\n  .seg { display: inline-flex; background: var(--gray-100); padding: 3px; border-radius: var(--radius-sm); }\\n  .seg button { background: transparent; border: 0; font-family: var(--font-sans); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 4px; color: var(--fg-2); cursor: pointer; }\\n  .seg button.on { background: var(--white); color: var(--primary); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }\\n\\n  .check { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }\\n  .check input { width: 16px; height: 16px; accent-color: var(--primary); }\\n<\u002Fstyle>\\n<\u002Fhead>\\n<body>\\n<header>\\n  <span class=\\\"name\\\">Components<\u002Fspan>\\n  <h1>The atomic kit.<\u002Fh1>\\n  <p style=\\\"color: var(--fg-2); font-size: 16px; max-width: 760px; margin-top: 12px;\\\">Buttons, badges, inputs, tables, cards. Conservative, dense, Bootstrap‑adjacent. Clinical components live on a separate page.<\u002Fp>\\n<\u002Fheader>\\n\\n<div class=\\\"group-label\\\">Buttons<\u002Fdiv>\\n<div class=\\\"panel\\\">\\n  <div class=\\\"row-flex\\\" style=\\\"margin-bottom: 14px;\\\">\\n    <button class=\\\"btn btn-primary\\\">Save changes<\u002Fbutton>\\n    <button class=\\\"btn btn-secondary\\\">Cancel<\u002Fbutton>\\n    <button class=\\\"btn btn-ghost\\\">Skip<\u002Fbutton>\\n    <button class=\\\"btn btn-success\\\">Acknowledge<\u002Fbutton>\\n    <button class=\\\"btn btn-danger\\\">Override<\u002Fbutton>\\n    <button class=\\\"btn btn-primary\\\" disabled>Disabled<\u002Fbutton>\\n  <\u002Fdiv>\\n  <div class=\\\"row-flex\\\">\\n    <button class=\\\"btn btn-primary btn-sm\\\">Order labs<\u002Fbutton>\\n    <button class=\\\"btn btn-primary\\\">Order labs<\u002Fbutton>\\n    <button class=\\\"btn btn-primary btn-lg\\\">Order labs<\u002Fbutton>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Badges &amp; status pills<\u002Fdiv>\\n<div class=\\\"panel\\\">\\n  <div class=\\\"row-flex\\\">\\n    <span class=\\\"badge badge-success\\\">✓ ACTIVE<\u002Fspan>\\n    <span class=\\\"badge badge-info\\\">SCHEDULED<\u002Fspan>\\n    <span class=\\\"badge badge-warn\\\">⚡ MODERATE<\u002Fspan>\\n    <span class=\\\"badge badge-danger\\\">⚠ CRITICAL<\u002Fspan>\\n    <span class=\\\"badge badge-neutral\\\">DISCHARGED<\u002Fspan>\\n    <span class=\\\"badge badge-primary\\\">NEW<\u002Fspan>\\n    <span class=\\\"badge\\\" style=\\\"background: var(--clinical-critical); color: #fff;\\\">⛔ CONTRAINDICATED<\u002Fspan>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Form fields<\u002Fdiv>\\n<div class=\\\"panel\\\" style=\\\"display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px;\\\">\\n  <div class=\\\"field\\\"><label>Patient name<\u002Flabel><input class=\\\"input\\\" value=\\\"Sarah Mitchell\\\"><\u002Fdiv>\\n  <div class=\\\"field\\\"><label>MRN<\u002Flabel><input class=\\\"input\\\" value=\\\"A‑0042199\\\" style=\\\"font-family: var(--font-mono);\\\"><\u002Fdiv>\\n  <div class=\\\"field\\\"><label>Unit<\u002Flabel>\\n    <select class=\\\"select\\\"><option>ICU‑4B<\u002Foption><option>ICU‑3A<\u002Foption><option>2B<\u002Foption><\u002Fselect>\\n  <\u002Fdiv>\\n  <div class=\\\"field\\\"><label>Diagnosis<\u002Flabel><input class=\\\"input\\\" placeholder=\\\"ICD‑10 search…\\\"><\u002Fdiv>\\n  <div class=\\\"field\\\"><label>Allergies<\u002Flabel><input class=\\\"input\\\" value=\\\"Penicillin, sulfa\\\"><\u002Fdiv>\\n  <div class=\\\"field\\\"><label>Date of admit<\u002Flabel><input class=\\\"input\\\" value=\\\"2025‑03‑12 14:08\\\" style=\\\"font-family: var(--font-mono);\\\"><\u002Fdiv>\\n  <div class=\\\"field\\\" style=\\\"grid-column: 1 / -1;\\\"><label>Notes<\u002Flabel><textarea class=\\\"textarea\\\" rows=\\\"2\\\" style=\\\"height: auto; resize: vertical;\\\">Hemodynamically stable. Continuous SpO₂ monitoring requested.<\u002Ftextarea><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Toggles &amp; selectors<\u002Fdiv>\\n<div class=\\\"panel\\\" style=\\\"display: flex; gap: 32px; align-items: center;\\\">\\n  <div class=\\\"seg\\\"><button class=\\\"on\\\">Today<\u002Fbutton><button>7 days<\u002Fbutton><button>30 days<\u002Fbutton><\u002Fdiv>\\n  <label class=\\\"check\\\"><input type=\\\"checkbox\\\" checked> Show resolved alerts<\u002Flabel>\\n  <label class=\\\"check\\\"><input type=\\\"checkbox\\\"> Auto‑refresh<\u002Flabel>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Table<\u002Fdiv>\\n<div class=\\\"panel\\\" style=\\\"padding: 0; overflow: hidden;\\\">\\n  <table class=\\\"t\\\">\\n    <thead><tr><th>Patient<\u002Fth><th>Unit / Bed<\u002Fth><th>Diagnosis<\u002Fth><th>HR<\u002Fth><th>SpO₂<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead>\\n    <tbody>\\n      <tr><td><strong>Sarah Mitchell<\u002Fstrong><div class=\\\"text-meta\\\">62F · MRN A‑0042199<\u002Fdiv><\u002Ftd><td>ICU‑4B · 12<\u002Ftd><td>Acute MI, post‑PCI<\u002Ftd><td class=\\\"num\\\">96<\u002Ftd><td class=\\\"num\\\">94 %<\u002Ftd><td><span class=\\\"badge badge-danger\\\">⚠ CRITICAL<\u002Fspan><\u002Ftd><\u002Ftr>\\n      <tr><td><strong>James Rodriguez<\u002Fstrong><div class=\\\"text-meta\\\">45M · MRN A‑0042204<\u002Fdiv><\u002Ftd><td>3A · 4<\u002Ftd><td>Post‑craniotomy D2<\u002Ftd><td class=\\\"num\\\">68<\u002Ftd><td class=\\\"num\\\">99 %<\u002Ftd><td><span class=\\\"badge badge-warn\\\">⚡ HIGH<\u002Fspan><\u002Ftd><\u002Ftr>\\n      <tr><td><strong>Maria Santos<\u002Fstrong><div class=\\\"text-meta\\\">58F · MRN A‑0042217<\u002Fdiv><\u002Ftd><td>2B · 6<\u002Ftd><td>Post‑op cholecystectomy<\u002Ftd><td class=\\\"num\\\">74<\u002Ftd><td class=\\\"num\\\">97 %<\u002Ftd><td><span class=\\\"badge\\\" style=\\\"background:#FFFDE7; color:#FFC107;\\\">MODERATE<\u002Fspan><\u002Ftd><\u002Ftr>\\n      <tr><td><strong>David Park<\u002Fstrong><div class=\\\"text-meta\\\">34M · MRN A‑0042231<\u002Fdiv><\u002Ftd><td>1A · 2<\u002Ftd><td>Observation — chest pain r/o<\u002Ftd><td class=\\\"num\\\">72<\u002Ftd><td class=\\\"num\\\">98 %<\u002Ftd><td><span class=\\\"badge badge-success\\\">LOW<\u002Fspan><\u002Ftd><\u002Ftr>\\n    <\u002Ftbody>\\n  <\u002Ftable>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Card<\u002Fdiv>\\n<div class=\\\"row-flex\\\" style=\\\"gap: 16px;\\\">\\n  <div class=\\\"card-demo\\\">\\n    <div style=\\\"display:flex; justify-content: space-between; align-items: flex-start;\\\">\\n      <div>\\n        <div class=\\\"ttl\\\">Heparin drip<\u002Fdiv>\\n        <div class=\\\"met\\\">1 000 u/h · started 14:32<\u002Fdiv>\\n      <\u002Fdiv>\\n      <span class=\\\"badge badge-success\\\">✓ ACTIVE<\u002Fspan>\\n    <\u002Fdiv>\\n    <div style=\\\"display:flex; gap: 12px; margin-top: 6px;\\\">\\n      <button class=\\\"btn btn-secondary btn-sm\\\">Adjust<\u002Fbutton>\\n      <button class=\\\"btn btn-ghost btn-sm\\\">Discontinue<\u002Fbutton>\\n    <\u002Fdiv>\\n  <\u002Fdiv>\\n  <div class=\\\"card-demo\\\" style=\\\"border-left: 3px solid var(--primary);\\\">\\n    <div class=\\\"text-tiny\\\" style=\\\"color: var(--primary);\\\">REMINDER<\u002Fdiv>\\n    <div class=\\\"ttl\\\">Morning labs at 07:00<\u002Fdiv>\\n    <div class=\\\"met\\\">CBC, BMP, troponin · Phlebotomy notified<\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<\u002Fbody>\\n<\u002Fhtml>\\n\",\"clinical\":\"<!doctype html>\\n<!-- @dsCard group=\\\"Components\\\" name=\\\"Symplify – Clinical Components\\\" subtitle=\\\"Drug interactions, handoff, SBAR, vitals, AI confidence\\\" viewport=\\\"1280x2400\\\" -->\\n<html lang=\\\"en\\\">\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<title>Clinical Components — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-width: 767.98px) {\\n  :root {\\n    --spacing-page: 12px;\\n    --spacing-card: 12px;\\n    --space-card-inset: var(--space-3);\\n    --touch-target: var(--touch-target-mobile);\\n    --chart-min-height: 200px;\\n  }\\n}\\n@media (min-width: 768px) and (max-width: 834px) {  /* iPad Pro 11\\\" portrait */\\n  :root { --spacing-page: 16px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 250px; }\\n}\\n@media (min-width: 835px) and (max-width: 1210px) { /* tablet landscape */\\n  :root { --spacing-page: 20px; --spacing-card: 16px; --space-card-inset: var(--space-4); --touch-target: 44px; --chart-min-height: 280px; }\\n}\\n\\n/* ─── Semantic typography classes ───────────────────────── */\\nhtml { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }\\nbody {\\n  font-family: var(--font-sans);\\n  font-size: var(--text-base);\\n  line-height: var(--lh-body);\\n  color: var(--fg-1);\\n  background: var(--bg-app);\\n}\\n\\n.h1, h1 { font-size: var(--text-2xl); font-weight: var(--fw-bold);     line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h2, h2 { font-size: var(--text-xl);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h3, h3 { font-size: var(--text-lg);  font-weight: var(--fw-semibold); line-height: var(--lh-snug); color: var(--heading-color); margin: 0; }\\n.h4, h4 { font-size: var(--text-md);  font-weight: var(--fw-bold);     line-height: var(--lh-tight); color: var(--heading-color); margin: 0; }\\n.text-body  { font-size: var(--text-base); font-weight: var(--fw-regular); color: var(--fg-2); }\\n.text-table { font-size: var(--fs-table);  font-weight: var(--fw-medium);  color: var(--fg-2); }\\n.text-meta  { font-size: var(--text-xs);   font-weight: var(--fw-medium);  color: var(--fg-3); }\\n.text-tiny  { font-size: var(--fs-tiny);   font-weight: var(--fw-medium);  color: var(--fg-3); letter-spacing: 0.04em; text-transform: uppercase; }\\n.btn-label  { font-size: var(--text-sm);   font-weight: var(--fw-bold); line-height: 1; }\\n.clinical-num { font-family: var(--font-mono); font-size: var(--font-size-clinical); font-feature-settings: 'tnum'; }\\ncode, .mono { font-family: var(--font-mono); font-size: 13px; }\\n\\n<\u002Fstyle>\\n<style>\\n  body { padding: 56px 64px; max-width: 1280px; }\\n  header { margin-bottom: 40px; }\\n  .name { font-size: 13px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--primary); }\\n  h1 { font-size: 56px; font-weight: 800; letter-spacing: -0.02em; margin-top: 18px; }\\n  .group-label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); margin: 48px 0 14px; }\\n\\n  /* Clinical severity alert — 5-tier tokens */\\n  .alert { padding: 16px 20px; border-radius: var(--radius-md); display: flex; flex-direction: column; gap: 8px; border: 1px solid; border-left-width: 4px; }\\n  .alert-head { display: flex; gap: 8px; align-items: center; font-weight: 700; font-size: 14px; }\\n  .alert-icon { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; }\\n  .alert-body { font-size: 12px; line-height: 18px; }\\n  .alert-rec { font-weight: 700; font-size: 12px; margin-top: 4px; }\\n  .alert-actions { display: flex; gap: 8px; margin-top: 6px; }\\n  .alert-actions button { font: 600 11px var(--font-sans); padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid currentColor; background: transparent; color: inherit; cursor: pointer; }\\n\\n  .a-minor    { background: var(--clinical-stable-bg);   color: var(--clinical-stable);   border-color: var(--clinical-stable-border);   border-left-color: var(--clinical-stable); }\\n  .a-moderate { background: var(--clinical-caution-bg);  color: var(--clinical-caution);  border-color: var(--clinical-caution-border);  border-left-color: var(--clinical-caution); }\\n  .a-major    { background: var(--clinical-urgent-bg);   color: var(--clinical-urgent);   border-color: var(--clinical-urgent-border);   border-left-color: var(--clinical-urgent); }\\n  .a-contra   { background: var(--clinical-critical-bg); color: var(--clinical-critical); border-color: var(--clinical-critical-border); border-left-color: var(--clinical-critical); }\\n\\n  .alert-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }\\n\\n  /* Patient handoff card */\\n  .handoff-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }\\n  .handoff { background: white; border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow-subtle); }\\n  .h-critical  { border: 3px solid var(--clinical-critical); }\\n  .h-high      { border: 3px solid var(--clinical-urgent); }\\n  .h-moderate  { border: 3px solid var(--clinical-caution); }\\n  .h-low       { border: 3px solid var(--clinical-stable); }\\n  .h-head { display: flex; justify-content: space-between; align-items: flex-start; }\\n  .h-name { font: 700 15px var(--font-sans); color: var(--gray-900); }\\n  .h-meta { color: var(--gray-500); font-size: 12px; margin-top: 2px; }\\n  .h-pill { padding: 3px 10px; border-radius: 50px; font: 700 10px var(--font-sans); letter-spacing: 0.05em; line-height: 1; }\\n  .h-dx { background: var(--gray-150); border-radius: var(--radius-sm); padding: 8px 12px; display: flex; gap: 6px; align-items: center; font-weight: 500; font-size: 12px; }\\n  .h-vitals { display: flex; gap: 8px; }\\n  .h-vital { flex: 1; background: var(--gray-50); border-radius: var(--radius-sm); padding: 10px 12px; }\\n  .h-vital .v { font: 700 18px var(--font-mono); color: var(--gray-900); font-feature-settings: 'tnum'; line-height: 1; }\\n  .h-vital .lbl { font-size: 10px; font-weight: 600; color: var(--gray-400); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }\\n  .h-vital .trend { font-size: 11px; font-weight: 500; margin-top: 2px; color: var(--gray-500); }\\n  .h-divider { border-top: 1px solid var(--border-color); margin: 4px 0; }\\n  .h-tasks { display: flex; flex-direction: column; gap: 8px; }\\n  .h-tasks .task { font-size: 12px; color: var(--gray-700); }\\n  .h-toggle { font-weight: 500; font-size: 11px; color: var(--primary); cursor: pointer; }\\n\\n  /* SBAR */\\n  .sbar { display: grid; grid-template-columns: 60px 1fr; gap: 0; background: white; border: 1px solid var(--border-color); border-radius: var(--radius-sm); overflow: hidden; box-shadow: var(--shadow-subtle); }\\n  .sbar > div { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }\\n  .sbar > div:nth-last-child(-n+2) { border-bottom: 0; }\\n  .sbar .key { background: var(--primary); color: white; font: 800 16px var(--font-sans); display: flex; align-items: center; justify-content: center; }\\n  .sbar .key.sB { background: var(--info); }\\n  .sbar .key.sA { background: var(--warning); color: #fff; }\\n  .sbar .key.sR { background: var(--success); }\\n  .sbar .lbl { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-3); }\\n  .sbar .val { font-size: 13px; line-height: 1.5; color: var(--fg-1); margin-top: 2px; }\\n\\n  /* AI confidence */\\n  .conf { background: white; border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 24px 28px; box-shadow: var(--shadow-subtle); }\\n  .conf-row { display: grid; grid-template-columns: 110px 1fr 50px; gap: 14px; align-items: center; }\\n  .conf .lbl { font-size: 12px; font-weight: 500; color: var(--fg-3); }\\n  .conf .track { height: 8px; border-radius: 4px; background: var(--gray-150); overflow: hidden; }\\n  .conf .fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #667EEA 0%, #764BA2 100%); }\\n  .conf .pct { font-weight: 700; font-size: 14px; color: var(--primary); text-align: right; font-feature-settings: 'tnum'; }\\n  .conf .desc { font-size: 12px; color: var(--fg-3); margin-top: 8px; }\\n\\n  /* Vitals row */\\n  .vitals-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }\\n  .vital-card { background: white; border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--shadow-subtle); }\\n  .vital-card .vk { font-size: 10px; font-weight: 700; color: var(--fg-3); letter-spacing: 0.06em; text-transform: uppercase; }\\n  .vital-card .vv { font: 700 22px var(--font-mono); color: var(--fg-1); margin-top: 4px; font-feature-settings: 'tnum'; line-height: 1; }\\n  .vital-card .vu { font-size: 11px; color: var(--fg-3); font-weight: 500; }\\n  .vital-card .vt { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; margin-top: 6px; }\\n  .v-up   { color: var(--clinical-critical); }\\n  .v-down { color: var(--clinical-caution); }\\n  .v-flat { color: var(--clinical-stable); }\\n<\u002Fstyle>\\n<\u002Fhead>\\n<body>\\n<header>\\n  <span class=\\\"name\\\">Clinical components<\u002Fspan>\\n  <h1>The shapes only this product makes.<\u002Fh1>\\n  <p style=\\\"color: var(--fg-2); font-size: 16px; max-width: 760px; margin-top: 12px;\\\">Drug‑interaction alerts, patient handoff cards, SBAR communication, vital displays, AI confidence. Built directly from the clinical Figma library.<\u002Fp>\\n<\u002Fheader>\\n\\n<div class=\\\"group-label\\\">Drug‑interaction alerts — 4 severities × 2 states<\u002Fdiv>\\n<p style=\\\"color: var(--fg-2); font-size: 13px; max-width: 760px; margin-bottom: 14px; margin-top: -6px;\\\">Mapped onto the clinical token scale: minor → <strong>stable<\u002Fstrong>, moderate → <strong>caution<\u002Fstrong>, major → <strong>urgent<\u002Fstrong>, contraindicated → <strong>critical<\u002Fstrong>. Tinted background, solid foreground, 4px left accent.<\u002Fp>\\n<div class=\\\"alert-grid\\\">\\n  <!-- Minor collapsed -->\\n  <div class=\\\"alert a-minor\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">ℹ<\u002Fspan> Minor: Omeprazole + Calcium<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">May reduce calcium absorption. Space doses by 2+ hours.<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Minor expanded -->\\n  <div class=\\\"alert a-minor\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">ℹ<\u002Fspan> Minor: Omeprazole + Calcium<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">May reduce calcium absorption. Space doses by 2+ hours.<\u002Fdiv>\\n    <div class=\\\"alert-rec\\\">Recommendation:<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Monitor calcium levels at next routine labs.<\u002Fdiv>\\n    <div class=\\\"alert-actions\\\"><button>View details<\u002Fbutton><button>Override<\u002Fbutton><button>Dismiss<\u002Fbutton><\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Moderate collapsed -->\\n  <div class=\\\"alert a-moderate\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⚡<\u002Fspan> Moderate: Metformin + Lisinopril<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">May increase hypoglycemia and lactic acidosis risk.<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Moderate expanded -->\\n  <div class=\\\"alert a-moderate\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⚡<\u002Fspan> Moderate: Metformin + Lisinopril<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">May increase hypoglycemia and lactic acidosis risk.<\u002Fdiv>\\n    <div class=\\\"alert-rec\\\">Recommendation:<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Monitor renal function and glucose levels weekly.<\u002Fdiv>\\n    <div class=\\\"alert-actions\\\"><button>View details<\u002Fbutton><button>Override<\u002Fbutton><button>Dismiss<\u002Fbutton><\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Major collapsed -->\\n  <div class=\\\"alert a-major\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⚠<\u002Fspan> Major: Warfarin + Aspirin<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Significantly increased bleeding risk.<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Major expanded -->\\n  <div class=\\\"alert a-major\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⚠<\u002Fspan> Major: Warfarin + Aspirin<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Significantly increased bleeding risk.<\u002Fdiv>\\n    <div class=\\\"alert-rec\\\">Recommendation:<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Monitor INR closely. Consider alternative antiplatelet.<\u002Fdiv>\\n    <div class=\\\"alert-actions\\\"><button>View details<\u002Fbutton><button>Override<\u002Fbutton><button>Dismiss<\u002Fbutton><\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Contraindicated collapsed -->\\n  <div class=\\\"alert a-contra\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⛔<\u002Fspan> Contraindicated: MAOIs + SSRIs<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Risk of serotonin syndrome — potentially fatal.<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Contraindicated expanded -->\\n  <div class=\\\"alert a-contra\\\">\\n    <div class=\\\"alert-head\\\"><span class=\\\"alert-icon\\\">⛔<\u002Fspan> Contraindicated: MAOIs + SSRIs<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Risk of serotonin syndrome — potentially fatal.<\u002Fdiv>\\n    <div class=\\\"alert-rec\\\">Recommendation:<\u002Fdiv>\\n    <div class=\\\"alert-body\\\">Do NOT co‑administer. Minimum 14‑day washout period.<\u002Fdiv>\\n    <div class=\\\"alert-actions\\\"><button>View details<\u002Fbutton><button>Override<\u002Fbutton><button>Dismiss<\u002Fbutton><\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Patient handoff card — clinical tiers × expanded<\u002Fdiv>\\n<div class=\\\"handoff-grid\\\">\\n  <!-- Critical collapsed -->\\n  <div class=\\\"handoff h-critical\\\">\\n    <div class=\\\"h-head\\\">\\n      <div><div class=\\\"h-name\\\">Sarah Mitchell<\u002Fdiv><div class=\\\"h-meta\\\">62F · ICU‑4B · Bed 12<\u002Fdiv><\u002Fdiv>\\n      <span class=\\\"h-pill\\\" style=\\\"background: var(--clinical-critical-bg); color: var(--clinical-critical);\\\">CRITICAL<\u002Fspan>\\n    <\u002Fdiv>\\n    <div class=\\\"h-dx\\\">🏥 <span>Acute MI, post‑PCI<\u002Fspan><\u002Fdiv>\\n    <div class=\\\"h-vitals\\\">\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">142/88<\u002Fdiv><div class=\\\"lbl\\\">BP<\u002Fdiv><div class=\\\"trend\\\">↑ Watch<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">96<\u002Fdiv><div class=\\\"lbl\\\">HR<\u002Fdiv><div class=\\\"trend\\\">→ Stable<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">94%<\u002Fdiv><div class=\\\"lbl\\\">SpO₂<\u002Fdiv><div class=\\\"trend\\\">↓ Watch<\u002Fdiv><\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"h-toggle\\\">▼ Tap to expand<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Critical expanded -->\\n  <div class=\\\"handoff h-critical\\\">\\n    <div class=\\\"h-head\\\">\\n      <div><div class=\\\"h-name\\\">Sarah Mitchell<\u002Fdiv><div class=\\\"h-meta\\\">62F · ICU‑4B · Bed 12<\u002Fdiv><\u002Fdiv>\\n      <span class=\\\"h-pill\\\" style=\\\"background: var(--clinical-critical-bg); color: var(--clinical-critical);\\\">CRITICAL<\u002Fspan>\\n    <\u002Fdiv>\\n    <div class=\\\"h-dx\\\">🏥 <span>Acute MI, post‑PCI<\u002Fspan><\u002Fdiv>\\n    <div class=\\\"h-vitals\\\">\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">142/88<\u002Fdiv><div class=\\\"lbl\\\">BP<\u002Fdiv><div class=\\\"trend\\\">↑ Watch<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">96<\u002Fdiv><div class=\\\"lbl\\\">HR<\u002Fdiv><div class=\\\"trend\\\">→ Stable<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">94%<\u002Fdiv><div class=\\\"lbl\\\">SpO₂<\u002Fdiv><div class=\\\"trend\\\">↓ Watch<\u002Fdiv><\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"h-divider\\\"><\u002Fdiv>\\n    <div class=\\\"h-tasks\\\">\\n      <div class=\\\"text-tiny\\\" style=\\\"color: var(--fg-3);\\\">PENDING TASKS<\u002Fdiv>\\n      <div class=\\\"task\\\">☐ Review morning labs<\u002Fdiv>\\n      <div class=\\\"task\\\">☐ Update medication orders<\u002Fdiv>\\n      <div class=\\\"task\\\">☐ Schedule follow‑up imaging<\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"h-toggle\\\">▲ Collapse<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- High collapsed -->\\n  <div class=\\\"handoff h-high\\\">\\n    <div class=\\\"h-head\\\">\\n      <div><div class=\\\"h-name\\\">James Rodriguez<\u002Fdiv><div class=\\\"h-meta\\\">45M · 3A‑201 · Bed 4<\u002Fdiv><\u002Fdiv>\\n      <span class=\\\"h-pill\\\" style=\\\"background: var(--clinical-urgent-bg); color: var(--clinical-urgent);\\\">URGENT<\u002Fspan>\\n    <\u002Fdiv>\\n    <div class=\\\"h-dx\\\">🏥 <span>Post‑craniotomy Day 2<\u002Fspan><\u002Fdiv>\\n    <div class=\\\"h-vitals\\\">\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">128/76<\u002Fdiv><div class=\\\"lbl\\\">BP<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">68<\u002Fdiv><div class=\\\"lbl\\\">HR<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">99%<\u002Fdiv><div class=\\\"lbl\\\">SpO₂<\u002Fdiv><\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"h-toggle\\\">▼ Tap to expand<\u002Fdiv>\\n  <\u002Fdiv>\\n  <!-- Moderate collapsed -->\\n  <div class=\\\"handoff h-moderate\\\">\\n    <div class=\\\"h-head\\\">\\n      <div><div class=\\\"h-name\\\">Maria Santos<\u002Fdiv><div class=\\\"h-meta\\\">58F · 2B‑108 · Bed 6<\u002Fdiv><\u002Fdiv>\\n      <span class=\\\"h-pill\\\" style=\\\"background: var(--clinical-caution-bg); color: var(--clinical-caution);\\\">CAUTION<\u002Fspan>\\n    <\u002Fdiv>\\n    <div class=\\\"h-dx\\\">🏥 <span>Post‑op cholecystectomy<\u002Fspan><\u002Fdiv>\\n    <div class=\\\"h-vitals\\\">\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">118/72<\u002Fdiv><div class=\\\"lbl\\\">BP<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">74<\u002Fdiv><div class=\\\"lbl\\\">HR<\u002Fdiv><\u002Fdiv>\\n      <div class=\\\"h-vital\\\"><div class=\\\"v\\\">97%<\u002Fdiv><div class=\\\"lbl\\\">SpO₂<\u002Fdiv><\u002Fdiv>\\n    <\u002Fdiv>\\n    <div class=\\\"h-toggle\\\">▼ Tap to expand<\u002Fdiv>\\n  <\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">SBAR clinical communication<\u002Fdiv>\\n<div class=\\\"sbar\\\">\\n  <div class=\\\"key\\\">S<\u002Fdiv>\\n  <div><div class=\\\"lbl\\\">Situation<\u002Fdiv><div class=\\\"val\\\">62F, Sarah Mitchell, ICU‑4B Bed 12. Reporting BP 142/88, HR 96, SpO₂ 94 % — desaturating mildly over last hour.<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"key sB\\\">B<\u002Fdiv>\\n  <div><div class=\\\"lbl\\\">Background<\u002Fdiv><div class=\\\"val\\\">Admitted for acute MI 48 hrs ago, post‑PCI. Hx: HTN, DM2. On heparin drip 1 000 u/h, started 14:32.<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"key sA\\\">A<\u002Fdiv>\\n  <div><div class=\\\"lbl\\\">Assessment<\u002Fdiv><div class=\\\"val\\\">Hemodynamically stable but BP elevation and mild desaturation. Possible early fluid overload.<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"key sR\\\">R<\u002Fdiv>\\n  <div><div class=\\\"lbl\\\">Recommendation<\u002Fdiv><div class=\\\"val\\\">Request cardiology consult. Consider diuretic. Continuous SpO₂ monitoring.<\u002Fdiv><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">Vital signs row<\u002Fdiv>\\n<div class=\\\"vitals-row\\\">\\n  <div class=\\\"vital-card\\\"><div class=\\\"vk\\\">Heart rate<\u002Fdiv><div class=\\\"vv\\\">96 <span class=\\\"vu\\\">bpm<\u002Fspan><\u002Fdiv><div class=\\\"vt v-flat\\\">→ Stable<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"vital-card\\\"><div class=\\\"vk\\\">Blood pressure<\u002Fdiv><div class=\\\"vv\\\">142<span style=\\\"font-size:18px; color: var(--fg-3);\\\">/<\u002Fspan>88 <span class=\\\"vu\\\">mmHg<\u002Fspan><\u002Fdiv><div class=\\\"vt v-up\\\">↑ +12 / 1 h<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"vital-card\\\"><div class=\\\"vk\\\">SpO₂<\u002Fdiv><div class=\\\"vv\\\">94 <span class=\\\"vu\\\">%<\u002Fspan><\u002Fdiv><div class=\\\"vt v-down\\\">↓ −2 / 1 h<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"vital-card\\\"><div class=\\\"vk\\\">Temperature<\u002Fdiv><div class=\\\"vv\\\">38.6 <span class=\\\"vu\\\">°C<\u002Fspan><\u002Fdiv><div class=\\\"vt v-up\\\">↑ Fever<\u002Fdiv><\u002Fdiv>\\n  <div class=\\\"vital-card\\\"><div class=\\\"vk\\\">Respiratory rate<\u002Fdiv><div class=\\\"vv\\\">22 <span class=\\\"vu\\\">rpm<\u002Fspan><\u002Fdiv><div class=\\\"vt v-flat\\\">→ WNL<\u002Fdiv><\u002Fdiv>\\n<\u002Fdiv>\\n\\n<div class=\\\"group-label\\\">AI confidence indicator<\u002Fdiv>\\n<div class=\\\"conf\\\" style=\\\"display: flex; flex-direction: column; gap: 12px;\\\">\\n  <div class=\\\"conf-row\\\">\\n    <span class=\\\"lbl\\\">AI Confidence<\u002Fspan>\\n    <div class=\\\"track\\\"><div class=\\\"fill\\\" style=\\\"width: 92%;\\\"><\u002Fdiv><\u002Fdiv>\\n    <span class=\\\"pct\\\">92%<\u002Fspan>\\n  <\u002Fdiv>\\n  <div class=\\\"conf-row\\\">\\n    <span class=\\\"lbl\\\">Differential — top dx<\u002Fspan>\\n    <div class=\\\"track\\\"><div class=\\\"fill\\\" style=\\\"width: 76%;\\\"><\u002Fdiv><\u002Fdiv>\\n    <span class=\\\"pct\\\">76%<\u002Fspan>\\n  <\u002Fdiv>\\n  <div class=\\\"conf-row\\\">\\n    <span class=\\\"lbl\\\">Drug suggestion<\u002Fspan>\\n    <div class=\\\"track\\\"><div class=\\\"fill\\\" style=\\\"width: 58%; background: linear-gradient(90deg, #FFC107, #FF9800);\\\"><\u002Fdiv><\u002Fdiv>\\n    <span class=\\\"pct\\\" style=\\\"color: var(--warning);\\\">58%<\u002Fspan>\\n  <\u002Fdiv>\\n  <p class=\\\"desc\\\" style=\\\"margin-top: 4px;\\\">When confidence is below 70 %, the gradient swaps to amber and the recommendation surfaces a “Review with clinician” inline action. The bar never reads green; clinicians decide, AI suggests.<\u002Fp>\\n<\u002Fdiv>\\n\\n<\u002Fbody>\\n<\u002Fhtml>\\n\",\"brand\":\"<!doctype html>\\n<!-- @dsCard group=\\\"Brand\\\" name=\\\"Symplify – Brand\\\" subtitle=\\\"Logo, clear space, do/don't, in-product\\\" viewport=\\\"1280x1700\\\" -->\\n<html lang=\\\"en\\\">\\n<head>\\n<meta charset=\\\"utf-8\\\">\\n<title>Brand — Symplify<\u002Ftitle>\\n<style>\\n/* ─────────────────────────────────────────────────────────\\n * Symplify Design System — colors, type, spacing, elevation\\n * Source of truth: symplify-app_rebuild  ·  src/style/scss/_variables.scss\\n * (React 19 / Vite rebuild). Values mirror the SCSS token layer 1:1.\\n * Inter (variable) + JetBrains Mono loaded from Google Fonts.\\n * ───────────────────────────────────────────────────────── */\\n\\n@import url(\\\"https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap\\\");\\n@import url(\\\"https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap\\\");\\n\\n:root {\\n  /* ─── Brand ─────────────────────────────────────────── */\\n  --primary:                 #2E37A4;   /* Indigo navy — primary actions, links, brand */\\n  --primary-hover:           #3C449C;\\n  --primary-transparent:     #ECEDF7;\\n  --secondary:               #00D3C7;   /* Teal — secondary brand accent (logo dots) */\\n  --secondary-hover:         #17C2B9;\\n  --secondary-transparent:   #E8FBFA;\\n  --cyan:                    #00D3C7;\\n  --cyan-transparent:        #E9F8FB;\\n\\n  /* ─── Semantic / Status ─────────────────────────────── */\\n  --success:                 #27AE60;\\n  --success-hover:           #37A465;\\n  --success-transparent:     #F4FBF7;\\n  --info:                    #2F80ED;\\n  --info-hover:              #3D7FD7;\\n  --info-transparent:        #F4F9FE;\\n  --warning:                 #C9A227;\\n  --warning-hover:           #B8932A;\\n  --warning-transparent:     #FEFBF5;\\n  --danger:                  #EF1E1E;\\n  --danger-hover:            #D93030;\\n  --danger-transparent:      #FEF4F4;\\n\\n  /* Extended accents (badges, charts) */\\n  --indigo:                  #3538CD;\\n  --indigo-transparent:      #EDEDFB;\\n  --orange:                  #E04F16;\\n  --orange-transparent:      #FDF6F3;\\n  --teal:                    #0E9384;\\n  --teal-transparent:        #E9F5F4;\\n  --purple:                  #800080;\\n  --purple-transparent:      #F9F2F9;\\n  --pink:                    #DD2590;\\n  --pink-transparent:        #FDF4F9;\\n\\n  /* ─── Clinical severity — Healthcare Design Tokens ──────\\n   * 5-tier scale. Each tier: solid foreground + tinted -bg + -border.\\n   * Use literally: a \\\"caution\\\" state MUST use --clinical-caution-*. */\\n  --clinical-critical:        #DC2626;\\n  --clinical-critical-bg:     #FEF2F2;\\n  --clinical-critical-border: #FECACA;\\n  --clinical-urgent:          #EA580C;\\n  --clinical-urgent-bg:       #FFF7ED;\\n  --clinical-urgent-border:   #FED7AA;\\n  --clinical-caution:         #CA8A04;\\n  --clinical-caution-bg:      #FEFCE8;\\n  --clinical-caution-border:  #FEF08A;\\n  --clinical-stable:          #16A34A;\\n  --clinical-stable-bg:       #F0FDF4;\\n  --clinical-stable-border:   #BBF7D0;\\n  --clinical-info:            #1D4ED8;\\n  --clinical-info-bg:         #EFF6FF;\\n  --clinical-info-border:     #BFDBFE;\\n\\n  /* ─── Neutrals / Gray ramp (light → dark) ───────────── */\\n  --gray-50:                 #FAFBFC;   /* helper — lightest surface */\\n  --gray-100:                #CED1D7;\\n  --gray-150:                #F0F1F3;   /* helper — hairline backgrounds */\\n  --gray-200:                #B6BBC4;\\n  --gray-300:                #9DA4B0;\\n  --gray-400:                #858D9C;\\n  --gray-500:                #595F6E;   /* body text */\\n  --gray-600:                #545F74;\\n  --gray-700:                #3B4961;\\n  --gray-800:                #23324D;\\n  --gray-900:                #0A1B39;   /* headings, primary text */\\n  --gray-950:                #0A1B39;   /* alias of 900 */\\n  --gray-hover:              #091833;\\n\\n  /* ─── Surface ───────────────────────────────────────── */\\n  --white:                   #FFFFFF;\\n  --light:                   #F5F6F8;\\n  --dark:                    #0B0D0E;\\n  --border-color:            #E7E8EB;\\n  --heading-color:           #0A1B39;\\n  --body-color:              var(--gray-500);\\n  --bg-app:                  #F5F6F8;\\n  --bg-surface:              #FFFFFF;\\n  --bg-muted:                #FAFBFC;\\n\\n  /* ─── Foreground tokens ─────────────────────────────── */\\n  --fg-1:                    var(--gray-900);  /* primary text / headings */\\n  --fg-2:                    var(--gray-500);  /* body */\\n  --fg-3:                    var(--gray-400);  /* placeholder, meta */\\n  --fg-disabled:             var(--gray-300);\\n  --fg-on-primary:           var(--white);\\n  --link:                    var(--primary);\\n  --link-hover:              var(--primary-hover);\\n\\n  /* ─── Role-specific ─────────────────────────────────── */\\n  --doctor-sidebar-bg:       #1E4258;\\n  --sidebar-custom: linear-gradient(90deg, #1E3A5F 0%, #1A4D5C 100%); /* @kind other */ /* custom dark-teal nav */\\n\\n  /* ─── Typography ────────────────────────────────────── */\\n  --font-sans: \\\"Inter\\\", -apple-system, BlinkMacSystemFont, \\\"Segoe UI\\\", Roboto, sans-serif;\\n  --font-mono: \\\"JetBrains Mono\\\", \\\"Fira Code\\\", ui-monospace, SFMono-Regular, Consolas, monospace;\\n\\n  /* Weights */\\n  --fw-regular: 400;  /* @kind font */\\n  --fw-medium: 500;   /* @kind font */\\n  --fw-semibold: 600; /* @kind font */\\n  --fw-bold: 700;     /* @kind font */\\n\\n  /* Type scale (rem, base 14px) */\\n  --text-xs:   0.6875rem;  /* 11px — metadata, eyebrows */\\n  --text-sm:   0.75rem;    /* 12px — button label, badges, compact */\\n  --text-base: 0.875rem;   /* 14px — body, default ($font-size-base) */\\n  --text-md:   1rem;       /* 16px — card title, clinical emphasis */\\n  --text-lg:   1.125rem;   /* 18px — widget title */\\n  --text-xl:   1.25rem;    /* 20px — section header */\\n  --text-2xl:  1.5rem;     /* 24px — page title */\\n  --font-size-clinical: 1rem;  /* dosages, vitals — bumped for legibility */\\n\\n  /* Semantic aliases (legacy preview helpers → new scale) */\\n  --fs-page:    var(--text-2xl);\\n  --fs-section: var(--text-xl);\\n  --fs-widget:  var(--text-lg);\\n  --fs-card:    var(--text-md);\\n  --fs-body:    var(--text-base);\\n  --fs-table:   0.8125rem;  /* 13px — table cell (helper) */\\n  --fs-button:  var(--text-sm);\\n  --fs-meta:    var(--text-xs);\\n  --fs-tiny:    0.625rem;   /* 10px — pill labels (helper) */\\n\\n  --lh-tight: 1.0;  /* @kind other */\\n  --lh-snug:  1.25; /* @kind other */\\n  --lh-body:  1.5;  /* @kind other */\\n\\n  /* ─── Spacing — 4px grid ────────────────────────────── */\\n  --space-1: 4px;\\n  --space-2: 8px;\\n  --space-3: 12px;\\n  --space-4: 16px;\\n  --space-5: 20px;\\n  --space-6: 24px;\\n  --space-8: 32px;\\n  --space-10: 40px;\\n  --space-12: 48px;\\n  --space-16: 64px;\\n\\n  /* Component spacing aliases */\\n  --space-card-inset:  var(--space-5);\\n  --space-card-header: var(--space-4) var(--space-5);\\n  --space-modal-body:  var(--space-5);\\n  --space-table-cell:  var(--space-3) var(--space-4);\\n  --spacing-page: 20px;\\n  --spacing-card: 20px;\\n\\n  /* Touch targets */\\n  --touch-target-desktop: 32px;\\n  --touch-target-mobile: 44px;\\n  --touch-target: var(--touch-target-desktop);\\n\\n  /* ─── Radius ────────────────────────────────────────── */\\n  --radius-sm: 4px;    /* inputs, buttons, chips */\\n  --radius-md: 8px;    /* DEFAULT cards */\\n  --radius-lg: 12px;   /* modals, large cards */\\n  --radius-xl: 16px;   /* hero / feature cards */\\n  --radius-card:  var(--radius-md);\\n  --radius-modal: var(--radius-lg);\\n  --radius-pill: 999px;\\n\\n  /* ─── Elevation — 3 tiers ───────────────────────────── */\\n  --shadow-subtle:   0px 1px 2px 0px rgba(0,0,0,0.05);\\n  --shadow-medium:   0px 4px 6px -1px rgba(0,0,0,0.1), 0px 2px 4px -2px rgba(0,0,0,0.1);\\n  --shadow-elevated: 0px 10px 15px -3px rgba(0,0,0,0.1), 0px 4px 6px -4px rgba(0,0,0,0.1);\\n  /* Legacy brand glow shadows (still in codebase) */\\n  --box-shadow:    0px 0px 35px 0px rgba(104,134,177,0.15);\\n  --box-shadow-sm: 0px 1px 1px 0px rgba(0,0,0,0.05);\\n  --box-shadow-lg: 0 0 45px 0 rgba(108,118,136,0.2);\\n\\n  /* ─── Layout — responsive breakpoints ───────────────── */\\n  --chart-min-height: 300px;\\n  --bp-sm: 576px;\\n  --bp-md: 768px;\\n  --bp-lg: 992px;\\n  --bp-xl: 1200px;\\n  --bp-xxl: 1400px;\\n}\\n\\n/* Responsive token shifts (mirror the SCSS media blocks) */\\n@media (max-wid
